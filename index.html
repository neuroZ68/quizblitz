<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="QuizBlitz — Free real-time classroom quiz platform. Create interactive quizzes and engage your students." />
  <title>QuizBlitz — Classroom Quiz Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <div id="app" class="landing-page">
    <div class="landing-bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
    <header class="landing-header">
      <h1 class="logo">Quiz<span class="logo-accent">Blitz</span></h1>
      <p class="tagline">Free classroom engagement. No subscription needed.</p>
    </header>
    <main class="landing-actions">
      <a href="/host.html" class="btn btn-host" id="btn-host">
        <span class="btn-icon">🎓</span>
        <span class="btn-label">Host a Quiz</span>
        <span class="btn-sub">Create &amp; run quizzes</span>
      </a>
      <a href="/play.html" class="btn btn-play" id="btn-play">
        <span class="btn-icon">🎮</span>
        <span class="btn-label">Join a Game</span>
        <span class="btn-sub">Enter PIN to play</span>
      </a>
    </main>
    <footer class="landing-footer">
      <p>Supports 30+ players • Multiple choice • True/False • Fill-in-the-blank</p>
    </footer>
  </div>
</body>
</html>
